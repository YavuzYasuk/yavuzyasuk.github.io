    <!-- Import Map: tarayıcıya 'three' kelimesini nerede bulacağını söyler -->
    <script type="importmap">

      "imports": {

    <link rel="stylesheet" href="style.css">
    
    <style>
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .preview-card {
            background-color: #2a2a40;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .preview-model-kapsayici {
            width: 100%;
            height: 350px;
            background-color: #1a1a2e;
            position: relative;
        }
        
        .preview-info {
            padding: 20px;
            color: #ccc;
        }
        
        .preview-info h3 {
            margin-top: 0;
            color: #ff9800;
        }
        
        .preview-info p {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 0;
        }
    </style>
</head>
